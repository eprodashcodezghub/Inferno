appId: com.inferno.desktop
productName: Inferno
copyright: Copyright © 2026 Inferno

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - node_modules/**/*
  - '!node_modules/.bin'

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  category: public.app-category.productivity

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: build/icon.png
  category: Utility

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

asar: true

asarUnpack:
  - '**/*.node'
